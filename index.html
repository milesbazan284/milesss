<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILES | Streetwear</title>
    <style>
        /* Estilos Base - Estética Streetwear */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
            letter-spacing: 1px;
        }

        /* Navegación */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #888888;
        }

        /* Hero Section / Lanzamiento */
        .hero {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('TU_FOTO_DE_PORTADA.jpg') center/cover no-repeat;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        .hero p {
            font-size: 1.1rem;
            color: #888888;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .btn {
            background-color: #ffffff;
            color: #000000;
            padding: 12px 35px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
        }

        /* Galería de Productos (Lookbook) */
        .products-section {
            padding: 60px 40px;
        }

        .section-title {
            font-size: 1.5rem;
            text-transform: uppercase;
            margin-bottom: 40px;
            letter-spacing: 2px;
            border-left: 4px solid #ffffff;
            padding-left: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: #111111;
            border: 1px solid #1a1a1a;
            overflow: hidden;
            position: relative;
        }

        .product-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            filter: grayscale(20%);
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-name {
            font-size: 1rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .product-status {
            font-size: 0.8rem;
            color: #888888;
            border: 1px solid #333;
            padding: 4px 8px;
            text-transform: uppercase;
        }

        /* Footer */
        footer {
            padding: 40px;
            text-align: center;
            border-top: 1px solid #1a1a1a;
            color: #444444;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        /* Responsivo móvil */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            nav { padding: 20px; }
            .products-section { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <!-- Barra de Navegación -->
    <nav>
        <div class="logo">MILES</div>
        <div class="nav-links">
            <a href="#instagram">Instagram</a>
            <a href="#tiktok">TikTok</a>
        </nav>
    </nav>

    <!-- Sección Principal / Lanzamiento -->
    <section class="hero">
        <h1>HEAVEN & HELL</h1>
        <p>Próximo Drop / Disponible Pronto</p>
        <a href="#instagram" class="btn">Seguir Lanzamiento</a>
    </section>

    <!-- Galería del Drop -->
    <section class="products-section">
        <h2 class="section-title">Preview de la Colección</h2>
        <div class="grid">
            
            <!-- Prenda 1 -->
            <div class="product-card">
                <!-- Reemplaza con la ruta o link de tus fotos editadas -->
                <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=600" alt="Oversized Hoodie" class="product-img">
                <div class="product-info">
                    <span class="product-name">Oversized Hoodie</span>
                    <span class="product-status">Cooming Soon</span>
                </div>
            </div>

            <!-- Prenda 2 -->
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=600" alt="Streetwear Tee" class="product-img">
                <div class="product-info">
                    <span class="product-name">Graphic Tee</span>
                    <span class="product-status">Coming Soon</span>
                </div>
            </div>

            <!-- Prenda 3 -->
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1588850561407-ed78c282e89b?q=80&w=600" alt="Trucker Cap" class="product-img">
                <div class="product-info">
                    <span class="product-name">Trucker Cap</span>
                    <span class="product-status">Coming Soon</span>
                </div>
            </div>

        </div>
    </section>

    <!-- Pie de página -->
    <footer>
        &copy; 2026 MILES. Todos los derechos reservados.
    </footer>

</body>
</html>
